<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <style>
        body { width: 300px; padding: 15px; }
        .popup-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logo-sq { width: 24px; height: 24px; background: #00B4D8; border-radius: 5px; }
        .btn-open { width: 100%; background: #00B4D8; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="popup-logo">
        <div class="logo-sq"></div>
        <strong>FocusTime</strong>
    </div>
    <div style="margin-bottom: 20px;">
        <p style="color: #64748b; font-size: 14px;">Today's Focus</p>
        <h2 style="margin: 5px 0;">3h 24m</h2>
    </div>
    <button id="openDashboard" class="btn-open">Open Full Dashboard</button>
    <script src="script.js"></script>
</body>
</html>
